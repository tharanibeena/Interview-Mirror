<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Interview Mirror</span>
        <div>
            <a href="/saved" class="btn btn-info">Saved Questions</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Choose Your Practice Area</h2>
<div class="alert alert-info text-center">
    <h5>Practice Score: {{ score }} Questions Completed 🎯</h5>
</div>
    <div class="row">

        <!-- Aptitude -->
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4>Aptitude</h4>
                <p>Practice quantitative aptitude questions.</p>
                <a href="/aptitude" class="btn btn-primary">Start Practice</a>
            </div>
        </div>

        <!-- Coding -->
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4>Coding</h4>
                <p>Improve your programming skills.</p>
                <a href="/coding" class="btn btn-success">Start Coding</a>
            </div>
        </div>

        <!-- HR -->
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h4>HR Questions</h4>
                <p>Prepare for HR interviews.</p>
                <a href="/hr" class="btn btn-warning">Start HR Prep</a>
            </div>
        </div>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Practice Questions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Aptitude Practice</h2>

    <div class="card p-4 shadow">

        <h4>Question:</h4>
        <p>
            A train 150 meters long is moving at 45 km/hr. 
            How long will it take to cross a pole?
        </p>

        <form method="POST">
            <input type="text" name="answer" class="form-control mb-3" placeholder="Enter your answer">

            <button class="btn btn-primary">Submit Answer</button>
            <button class="btn btn-success" name="save" value="yes">Save Question</button>
        </form>

    </div>

</div>
</body>
</html>
